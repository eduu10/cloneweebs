<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#111111"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <filter id="neon">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="outerGlow">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.35" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="504" height="504" rx="92" ry="92" fill="none" stroke="#22c55e" stroke-opacity="0.15" stroke-width="2"/>

  <!-- Inner subtle grid pattern -->
  <g opacity="0.03">
    <line x1="128" y1="0" x2="128" y2="512" stroke="#22c55e" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#22c55e" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#22c55e" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#22c55e" stroke-width="1"/>
  </g>

  <!-- Background glow orb -->
  <circle cx="256" cy="256" r="160" fill="#22c55e" opacity="0.04"/>

  <!-- Main "CW" lettermark with neon effect -->
  <g filter="url(#outerGlow)">
    <!-- C letter -->
    <path d="M 148 196 C 148 162, 176 138, 212 138 L 230 138 C 238 138, 238 152, 230 152 L 212 152 C 186 152, 164 172, 164 196 L 164 316 C 164 340, 186 360, 212 360 L 230 360 C 238 360, 238 374, 230 374 L 212 374 C 176 374, 148 350, 148 316 Z"
      fill="url(#glow)" opacity="0.95"/>

    <!-- W letter -->
    <path d="M 252 138 C 252 132, 260 132, 262 138 L 302 310 L 342 200 C 344 194, 352 194, 354 200 L 394 310 L 434 138 C 436 132, 444 132, 444 138 L 396 374 C 394 380, 386 380, 384 374 L 348 264 L 312 374 C 310 380, 302 380, 300 374 Z"
      fill="url(#glow)" opacity="0.95"/>
  </g>

  <!-- Sparkle accents -->
  <g fill="url(#sparkle)" filter="url(#neon)">
    <!-- Top-right sparkle -->
    <path d="M 400 80 L 404 92 L 416 96 L 404 100 L 400 112 L 396 100 L 384 96 L 396 92 Z" opacity="0.9"/>
    <!-- Small sparkle -->
    <path d="M 120 90 L 123 98 L 131 101 L 123 104 L 120 112 L 117 104 L 109 101 L 117 98 Z" opacity="0.6"/>
    <!-- Bottom sparkle -->
    <path d="M 430 400 L 433 408 L 441 411 L 433 414 L 430 422 L 427 414 L 419 411 L 427 408 Z" opacity="0.7"/>
  </g>

  <!-- Thin decorative line at bottom -->
  <line x1="128" y1="420" x2="384" y2="420" stroke="url(#glow)" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- "IA" small text -->
  <text x="256" y="452" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="700" fill="#22c55e" opacity="0.5" text-anchor="middle" letter-spacing="8">IA</text>
</svg>
