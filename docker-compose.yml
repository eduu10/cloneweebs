services:
  # ==================== DATABASE ====================
  postgres:
    image: postgres:16-alpine
    container_name: clonestudio-postgres
    environment:
      POSTGRES_USER: clonestudio
      POSTGRES_PASSWORD: clonestudio_dev
      POSTGRES_DB: clonestudio
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clonestudio"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== CACHE ====================
  redis:
    image: redis:7-alpine
    container_name: clonestudio-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ==================== BACKEND ====================
  api:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: clonestudio-api
    ports:
      - "8080:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://clonestudio:clonestudio_dev@postgres:5432/clonestudio
      - REDIS_URL=redis://redis:6379/0
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - JWT_SECRET_KEY=dev-secret-key-change-in-production-min-32-chars
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=llama-3.3-70b-versatile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./services/api-gateway/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  # ==================== FRONTEND ====================
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: clonestudio-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080
    depends_on:
      - api
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    command: npm run dev

volumes:
  postgres_data:
  redis_data:
